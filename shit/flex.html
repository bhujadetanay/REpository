<!DOCTYPE html>
<html>

<head>
    <title>Hostel Flexbox Advanced</title>

    <style>
        .container {
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-be;
            align-items: center;
            flex-wrap: wrap-reverse;
            align-content: space-between;
            height: 500px;
            width: 400px;
            background-color: lightblue;
            padding: 10px;
        }

        .room {
            flex-basis: 80px;
            /* Initial height */
            flex-grow: 1;
            /* Grow vertically */
            flex-shrink: 1;
            width: 150px;
            background-color: navy;
            color: white;
            margin: 10px;
            text-align: center;
            line-height: 80px;
            border-radius: 10px;
        }

        /* VIP room grows more */
        .vip {
            flex-grow: 2;
            background-color: darkred;
        }

        /* Temporary room shrinks more */
        .temp {
            flex-shrink: 3;
        }

        .box {
            background-color: antiquewhite;
        }
    </style>
</head>

<body>

    <h2 style="text-align:center;">Hostel Room Allocation</h2>


    <div class="container">
        <div class="box">box-1</div>
        <div class="box">box-2</div>
        <div class="box">box-3</div>
        <div class="box">box-4</div>
        <div class="box">box-5</div>
        <div class="box">box-6</div>
        <div class="box">box-7</div>
        <div class="box">box-8</div>
    </div>

</body>

</html>
